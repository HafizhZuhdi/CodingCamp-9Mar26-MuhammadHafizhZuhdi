<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header: Greeting + Theme Toggle -->
  <header class="header">
    <div class="greeting-section">
      <div id="time" class="time"></div>
      <div id="date" class="date"></div>
      <div id="greeting" class="greeting"></div>
    </div>
    <div class="header-controls">
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">🌙</button>
      <button id="name-btn" class="btn-secondary">✏️ Set Name</button>
    </div>
  </header>

  <!-- Name Modal -->
  <div id="name-modal" class="modal hidden">
    <div class="modal-box">
      <h3>What's your name?</h3>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="30" />
      <div class="modal-actions">
        <button id="name-save" class="btn-primary">Save</button>
        <button id="name-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <main class="dashboard">
    <!-- Focus Timer -->
    <section class="card timer-card">
      <h2>Focus Timer</h2>
      <div id="timer-display" class="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="btn-primary">Start</button>
        <button id="timer-stop" class="btn-secondary">Stop</button>
        <button id="timer-reset" class="btn-secondary">Reset</button>
      </div>
      <div class="timer-duration">
        <label for="timer-minutes">Duration (min):</label>
        <input id="timer-minutes" type="number" min="1" max="120" value="25" />
        <button id="timer-set" class="btn-secondary">Set</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card todo-card">
      <h2>To-Do List</h2>
      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="Add a new task..." maxlength="100" />
        <button id="todo-add" class="btn-primary">Add</button>
      </div>
      <div class="todo-sort-row">
        <label for="todo-sort">Sort:</label>
        <select id="todo-sort">
          <option value="default">Default</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="done">Done last</option>
        </select>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card links-card">
      <h2>Quick Links</h2>
      <div class="links-input-row">
        <input id="link-name" type="text" placeholder="Label" maxlength="30" />
        <input id="link-url" type="url" placeholder="https://..." maxlength="200" />
        <button id="link-add" class="btn-primary">Add</button>
      </div>
      <div id="links-grid" class="links-grid"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
